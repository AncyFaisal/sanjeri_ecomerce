services:
  - type: web
    name: sanjeri-perfume
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sanjeri_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sanjeri_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DISABLE_COLLECTSTATIC
        value: 0

databases:
  - name: sanjeri_db
    plan: free